<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; background: black; }
        canvas { background: #eee; }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        // Create the pong paddle
        const paddleWidth = 10, paddleHeight = 100;
        const player = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: "blue", dy: 0 };
        const computer = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: "red", dy: 4 };

        // Create the pong ball
        const ball = { x: canvas.width / 2, y: canvas.height / 2, size: 10, speed: 4, dx: 4, dy: 4, color: "black" };

        // Draw function
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRect(player);
            drawRect(computer);
            drawArc(ball);
        }

        // Draw rectangle function
        function drawRect(rect) {
            ctx.fillStyle = rect.color;
            ctx.fillRect(rect.x, rect.y, rect.width, rect.height);
        }

        // Draw arc function
        function drawArc(circle) {
            ctx.fillStyle = circle.color;
            ctx.beginPath();
            ctx.arc(circle.x, circle.y, circle.size, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        // Update game function
        function update() {
            player.y += player.dy;
            computer.y += computer.dy;

            // Ball movement
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom
            if (ball.y + ball.size > canvas.height || ball.y - ball.size < 0) {
                ball.dy *= -1;
            }

            // Paddle collision
            if (ball.x - ball.size < player.x + player.width && ball.y > player.y && ball.y < player.y + player.height) {
                ball.dx *= -1;
            }

            if (ball.x + ball.size > computer.x && ball.y > computer.y && ball.y < computer.y + computer.height) {
                ball.dx *= -1;
            }

            // Reset ball and score if it goes out
            if (ball.x + ball.size < 0) {
                resetBall();
            }
            if (ball.x - ball.size > canvas.width) {
                resetBall();
            }

            // Simple AI for computer
            if (ball.y < computer.y + computer.height / 2) {
                computer.y -= computer.dy;
            } else {
                computer.y += computer.dy;
            }

            // Prevent paddles from leaving the canvas
            player.y = Math.max(Math.min(player.y, canvas.height - paddleHeight), 0);
            computer.y = Math.max(Math.min(computer.y, canvas.height - paddleHeight), 0);
        }

        // Reset ball function
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx *= -1;
        }

        // Keydown event
        document.addEventListener("keydown", function(event) {
            if (event.keyCode === 38) {
                player.dy = -4;
            } else if (event.keyCode === 40) {
                player.dy = 4;
            }
        });

        // Keyup event
        document.addEventListener("keyup", function(event) {
            if (event.keyCode === 38 || event.keyCode === 40) {
                player.dy = 0;
            }
        });

        // Animation loop
        function gameLoop() {
            draw();
            update();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
